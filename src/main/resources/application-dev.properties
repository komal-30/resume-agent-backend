# Server Configuration
server.port=8081
server.servlet.context-path=/


# Application Name
spring.application.name=resume-agent-backend

# Logging Configuration
logging.level.root=INFO
logging.level.com.resumeagent=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Jackson Configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# =====================================================
# API Keys - Replace with your actual keys
# =====================================================

# Claude API Configuration
# Get your API key from: https://console.anthropic.com/
claude.api.key=${CLAUDE_API_KEY:your-claude-api-key-here}
claude.api.url=https://api.anthropic.com/v1/messages
claude.model=claude-sonnet-4-20250514
claude.max.tokens=300
claude.api.version=2023-06-01

# Voyage AI Configuration
# Get your API key from: https://www.voyageai.com/
voyage.api.key=${VOYAGE_API_KEY:your-voyage-api-key-here}
voyage.api.url=https://api.voyageai.com/v1/embeddings
voyage.model=voyage-large-2-instruct

# ElevenLabs Configuration
# Get your API key from: https://elevenlabs.io/
elevenlabs.api.key=${ELEVENLABS_API_KEY:your-elevenlabs-api-key-here}
elevenlabs.api.url=https://api.elevenlabs.io/v1/text-to-speech
elevenlabs.voice.id=21m00Tcm4TlvDq8ikWAM
elevenlabs.model.id=eleven_monolingual_v1
elevenlabs.voice.stability=0.5
elevenlabs.voice.similarity.boost=0.75

# =====================================================
# Vector Store Configuration
# =====================================================
vector.store.file=src/main/resources/embeddings.json
vector.store.top.k=3

# =====================================================
# Resume Configuration
# =====================================================
resume.pdf.path=src/main/resources/resume/Koko_Resume.pdf

# =====================================================
# RAG Configuration
# =====================================================
rag.chunk.min.size=100
rag.chunk.max.size=800
rag.similarity.threshold=0.7
# To use custom patterns, update this line:
rag.section.patterns=PROFESSIONAL SUMMARY|WORK HISTORY|TECHNICAL EXPERTISE|EDUCATION

# Leave it empty to use the comprehensive default patterns

# =====================================================
# CORS Configuration
# =====================================================
cors.allowed.origins=http://localhost:5173,https://yourapp.vercel.app
cors.allowed.methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed.headers=*
cors.allow.credentials=true

# =====================================================
# HTTP Client Configuration
# =====================================================
http.client.connection.timeout=30000
http.client.read.timeout=60000
